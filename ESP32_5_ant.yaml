#В центральной возле роутера
# OLED 128x64 — лог-консоль (специфично для этой ESP)
# ST7789 1.9" 170x320 — лог-консоль / BLE radar — через packages/ble_radar.yaml
substitutions:
  board_name: 'esp32-5-ant'
  static_ip: '192.168.0.161'
  number: '5'
  pin_clk: GPIO14
  pin_mosi: GPIO27
  pin_cs: GPIO33
  pin_dc: GPIO25
  pin_reset: GPIO26
  pin_bl: GPIO32

esphome:
  name: ${board_name}
  on_boot:
    priority: -100
    then:
      - lambda: |-
          id(log_lines).push_back("${board_name} booted");
          id(log_lines).push_back("display OK");
          id(oled).turn_off();

esp32:
  board: esp-wrover-kit
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_BT_CONTROLLER_MODE_BLE_ONLY: y

packages:
  device_base: !include packages/1wifi_api_ota_logger.yaml
  base_sensors: !include packages/2common_sensors.yaml
  led: !include packages/3status_led_esp32.yaml
  ble_common: !include packages/ble_common.yaml
  ble_alex: !include packages/ble_alex.yaml
  ble_ira: !include packages/ble_ira.yaml
  ble_lila: !include packages/ble_lila.yaml
  ble_radar: !include packages/ble_radar.yaml

i2c:
  sda: GPIO21
  scl: GPIO22
  scan: true
  frequency: 1MHz
  id: bus_a

binary_sensor:
  - platform: homeassistant
    id: central_motion
    entity_id: binary_sensor.central_motion_occupancy
    on_press:
      then:
        - script.stop: display_off_delay
        - lambda: 'id(oled).turn_on();'
        - light.turn_on: backlight
    on_release:
      then:
        - script.execute: display_off_delay

script:
  - id: display_off_delay
    mode: restart
    then:
      - delay: 2min
      - lambda: 'id(oled).turn_off();'
      - light.turn_off: backlight

font:
  - file: "gfonts://Roboto Mono"
    id: f_oled
    size: 8
    glyphs: '!"#$%&''()*+,-./:;<=>?@[\]^_`{|}~0123456789AaBbCcDdEeFfGgHhIiJjKkLlMmNnOoPpQqRrSsTtUuVvWwXxYyZz °'

display:
  - platform: ssd1306_i2c
    model: "SSD1306 128x64"
    address: 0x3C
    id: oled
    update_interval: 16ms
    lambda: |-
      uint32_t t = millis();
      const int LOG_MAX_OLED = 8;
      auto &v = id(log_lines);
      int n = (int)v.size();
      int start = (n > LOG_MAX_OLED) ? (n - LOG_MAX_OLED) : 0;
      int row = 0;
      for (int i = start; i < n; i++, row++) {
        int y = row * 8;
        if (y >= 64) break;
        auto &s = v[i];
        int xb, yb, w, h;
        it.get_text_bounds(0, 0, s.c_str(), id(f_oled), TextAlign::TOP_LEFT, &xb, &yb, &w, &h);
        if (w <= 128) {
          it.printf(0, y, id(f_oled), "%s", s.c_str());
        } else {
          const int gap = 30;
          int cycle = w + gap;
          int off_x = ((int)(t * 0.075f)) % cycle;
          it.printf(-off_x, y, id(f_oled), "%s", s.c_str());
          it.printf(-off_x + cycle, y, id(f_oled), "%s", s.c_str());
        }
      }
