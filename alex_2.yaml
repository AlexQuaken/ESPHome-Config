# В электрощитке — OLED 128x64 лог-консоль (через packages/oled_log_console.yaml)
substitutions:
  board_name: 'alex-2'
  static_ip: '192.168.0.18'
  number: '2'

esphome:
  name: ${board_name}
  on_boot:
    priority: -100
    then:
      - lambda: |-
          id(log_lines).push_back("${board_name} booted");
          id(log_lines).push_back("display OK");

esp32:
  board: esp32doit-devkit-v1
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_BT_CONTROLLER_MODE_BLE_ONLY: y

packages:
  device_base: !include packages/1wifi_api_ota_logger.yaml
  base_sensors: !include packages/2common_sensors.yaml
  led: !include packages/3status_led_esp32.yaml
  ble_common: !include packages/ble_common.yaml
  ble_alex: !include packages/ble_alex.yaml
  ble_ira: !include packages/ble_ira.yaml
  ble_lila: !include packages/ble_lila.yaml
  oled_log_console: !include packages/oled_log_console.yaml

i2c:
  sda: GPIO14
  scl: GPIO13
  scan: true
  frequency: 1MHz
  id: bus_a
