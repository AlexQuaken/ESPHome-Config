# Waveshare ESP32-C6-LCD-1.47 (без тача), ST7789 172x320
# Log/radar через packages/ble_radar.yaml — единый код с alex_3, esp32-5-ant, esp32-17
substitutions:
  board_name: 'esp32-c6-lcd'
  static_ip: '192.168.0.215'
  number: '215'
  pin_clk: GPIO7
  pin_mosi: GPIO6
  pin_cs: GPIO14
  pin_dc: GPIO15
  pin_reset: GPIO21
  pin_bl: GPIO22
  # У этого экрана 172px высота, не 170 (Waveshare LCD-1.47)
  lcd_height: "172"
  lcd_offset_h: "34"

esphome:
  name: ${board_name}
  on_boot:
    priority: -100
    then:
      - lambda: |-
          id(log_lines).push_back("${board_name} booted");
          id(log_lines).push_back("display OK");

esp32:
  board: esp32-c6-devkitc-1
  framework:
    type: esp-idf

packages:
  device_base: !include packages/1wifi_api_ota_logger.yaml
  base_sensors: !include packages/2common_sensors.yaml
  ble_common: !include packages/ble_common.yaml
  ble_alex: !include packages/ble_alex.yaml
  ble_ira: !include packages/ble_ira.yaml
  ble_lila: !include packages/ble_lila.yaml
  ble_radar: !include packages/ble_radar.yaml

# Встроенный RGB LED на C6 (GPIO8) — вместо обычного status_led
light:
  - platform: esp32_rmt_led_strip
    id: onboard_rgb
    name: ${board_name} RGB
    pin: GPIO8
    num_leds: 1
    rgb_order: GRB
    chipset: ws2812
