substitutions:
  board_name: 'esp32-cam1'
  static_ip: '192.168.0.176'

esphome:
  name: ${board_name}

esp32:
  board: esp32cam
  framework:
    type: esp-idf
    sdkconfig_options:
      # Brownout — снижаем порог до минимума ~2.43V
      CONFIG_ESP_BROWNOUT_DET_LVL_SEL_4: "n"
      CONFIG_ESP_BROWNOUT_DET_LVL_SEL_7: "y"
      # WiFi и lwIP на ядро 1, display loop остаётся на 0
      CONFIG_ESP_WIFI_TASK_PINNED_TO_CORE_1: "y"
      CONFIG_LWIP_TCPIP_TASK_AFFINITY_CPU1: "y"

psram:

# Safe mode entry для надёжного OTA
safe_mode:
  num_attempts: 10
  reboot_timeout: 5min
  boot_is_good_after: 60s

button:
  - platform: safe_mode
    name: "${board_name} Safe Mode (OTA)"
    id: btn_safe_mode

packages:
  device_base: !include packages/1wifi_api_ota_logger_mqtt.yaml
  base_sensors: !include packages/2common_sensors.yaml
  # status_led (IO2) убран — IO2 теперь идёт на RES дисплея
  # esp32cam убран временно — освобождаем память для дисплея

# камера временно отключена — освобождаем PSRAM/SRAM для дисплея

# UART логи включены через USB. BLK дисплея пока на VCC, PWM не нужен.
logger:
  level: DEBUG

# SPI шина для ST7789 1.9" 320x170 (заменили I2C OLED)
spi:
  - id: spi_lcd
    clk_pin: GPIO14
    mosi_pin: GPIO13

# PWM подсветка временно отключена — BLK на VCC напрямую.
# Если нужна регулировка яркости, переподключи BLK на IO3 и раскомментируй.

