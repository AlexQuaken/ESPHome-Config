globals:
  - id: last_scan_ms
    type: uint32_t
    restore_value: no
    initial_value: '0'

display:
  - platform: mipi_spi
    model: ST7789V
    spi_id: spi_lcd
    cs_pin: GPIO15
    dc_pin: GPIO12
    reset_pin: GPIO2
    dimensions:
      width: 320
      height: 170
      offset_width: 0
      offset_height: 35
    spi_mode: MODE3
    data_rate: 80MHz
    color_order: bgr
    color_depth: 16
    invert_colors: true
    transform:
      swap_xy: true
      mirror_x: true
      mirror_y: false
    buffer_size: 25%
    update_interval: 1s
    id: lcd
    lambda: |-
      const int W = 320;
      const int H = 170;
      const int ROWS = 6;
      const int HDR_H = 18;
      const int FOOT_H = 22;
      const int BODY_H = H - HDR_H - FOOT_H;       // 130
      const int ROW_H = BODY_H / ROWS;              // 21

      uint32_t now = millis();

      // header
      it.filled_rectangle(0, 0, W, HDR_H, id(c_bg_hdr));
      char tm_s[12], dt_s[8];
      auto tt = id(homeassistant_time).now();
      if (tt.is_valid()) {
        snprintf(tm_s, sizeof(tm_s), "%02d:%02d:%02d", tt.hour, tt.minute, tt.second);
        snprintf(dt_s, sizeof(dt_s), "%02d.%02d", tt.day_of_month, tt.month);
      } else { strcpy(tm_s, "--:--:--"); strcpy(dt_s, "--.--"); }
      it.printf(4, 1, id(f_mid), id(c_cyan), "%s", dt_s);
      it.printf(W - 4, 1, id(f_mid), id(c_white), display::TextAlign::TOP_RIGHT, "%s", tm_s);

      // detect scan counter change
      static float prev_scan = -1.0f;
      float cur_scan = id(bat_scan_counter).state;
      if (std::isfinite(cur_scan) && cur_scan != prev_scan) {
        id(last_scan_ms) = now;
        prev_scan = cur_scan;
      }

      auto fmt_v = [](float v) -> std::string {
        char b[8];
        if (std::isfinite(v)) snprintf(b, sizeof(b), "%5.2fV", v);
        else strcpy(b, "--.--V");
        return std::string(b);
      };
      auto fmt_c = [](float c) -> std::string {
        char b[6];
        if (std::isfinite(c)) snprintf(b, sizeof(b), "%4.2f", c);
        else strcpy(b, "-.--");
        return std::string(b);
      };

      struct Bat { float v, c1, c2, c3, c4, cyc; };
      Bat bats[6] = {
        { id(bat1_v).state, id(bat1_c1).state, id(bat1_c2).state, id(bat1_c3).state, id(bat1_c4).state, id(bat1_cyc).state },
        { id(bat2_v).state, id(bat2_c1).state, id(bat2_c2).state, id(bat2_c3).state, id(bat2_c4).state, id(bat2_cyc).state },
        { id(bat3_v).state, id(bat3_c1).state, id(bat3_c2).state, id(bat3_c3).state, id(bat3_c4).state, id(bat3_cyc).state },
        { id(bat4_v).state, id(bat4_c1).state, id(bat4_c2).state, id(bat4_c3).state, id(bat4_c4).state, id(bat4_cyc).state },
        { id(bat5_v).state, id(bat5_c1).state, id(bat5_c2).state, id(bat5_c3).state, id(bat5_c4).state, id(bat5_cyc).state },
        { id(bat6_v).state, id(bat6_c1).state, id(bat6_c2).state, id(bat6_c3).state, id(bat6_c4).state, id(bat6_cyc).state },
      };

      int active = 0;
      for (int r = 0; r < ROWS; r++) {
        const Bat &b = bats[r];
        int y = HDR_H + r * ROW_H + 1;
        bool ok = std::isfinite(b.v);
        if (ok) active++;

        float dmax = 0;
        if (std::isfinite(b.c1) && std::isfinite(b.c2) && std::isfinite(b.c3) && std::isfinite(b.c4)) {
          float lo = std::min(std::min(b.c1, b.c2), std::min(b.c3, b.c4));
          float hi = std::max(std::max(b.c1, b.c2), std::max(b.c3, b.c4));
          dmax = hi - lo;
        }

        auto tag_col = !ok ? id(c_dim)
                       : (dmax > 0.10f ? id(c_red)
                       : (dmax > 0.05f ? id(c_amber) : id(c_green)));

        it.filled_rectangle(0, y, 28, ROW_H - 2, tag_col);
        char tag[4];
        snprintf(tag, sizeof(tag), "B%d", r + 1);
        it.printf(14, y + 2, id(f_mid), id(c_black), display::TextAlign::TOP_CENTER, "%s", tag);

        it.printf(34, y + 1, id(f_big), ok ? id(c_white) : id(c_dim), "%s", fmt_v(b.v).c_str());

        char cells[40];
        snprintf(cells, sizeof(cells), "%s %s %s %s", fmt_c(b.c1).c_str(), fmt_c(b.c2).c_str(), fmt_c(b.c3).c_str(), fmt_c(b.c4).c_str());
        it.printf(124, y + 4, id(f_small), ok ? id(c_white) : id(c_dim), "%s", cells);

        char cyc[8];
        if (std::isfinite(b.cyc)) snprintf(cyc, sizeof(cyc), "%dc", (int)b.cyc);
        else strcpy(cyc, "--c");
        it.printf(W - 4, y + 4, id(f_small), id(c_amber), display::TextAlign::TOP_RIGHT, "%s", cyc);
      }

      // footer (vertically centered)
      int fy = H - FOOT_H;
      int ty = fy + (FOOT_H - 13) / 2;   // f_small=13
      it.filled_rectangle(0, fy, W, FOOT_H, id(c_bg_hdr));
      it.printf(4, ty, id(f_small), id(c_green), "active %d/6", active);

      // uptime HH:MM:SS (full)
      char up_s[16];
      uint32_t up = (uint32_t)id(uptime_sensor).state;
      snprintf(up_s, sizeof(up_s), "up %02u:%02u:%02u", (unsigned)(up/3600), (unsigned)((up%3600)/60), (unsigned)(up%60));
      it.printf(W / 2, ty, id(f_small), id(c_white), display::TextAlign::TOP_CENTER, "%s", up_s);

      char scan_s[20];
      if (std::isfinite(id(bat_scan_counter).state)) {
        if (id(last_scan_ms) > 0) {
          uint32_t secs = (now - id(last_scan_ms)) / 1000;
          if (secs < 60) snprintf(scan_s, sizeof(scan_s), "#%d %us", (int)id(bat_scan_counter).state, (unsigned)secs);
          else if (secs < 3600) snprintf(scan_s, sizeof(scan_s), "#%d %um", (int)id(bat_scan_counter).state, (unsigned)(secs/60));
          else snprintf(scan_s, sizeof(scan_s), "#%d %uh", (int)id(bat_scan_counter).state, (unsigned)(secs/3600));
        } else snprintf(scan_s, sizeof(scan_s), "#%d", (int)id(bat_scan_counter).state);
      } else strcpy(scan_s, "scan ?");
      it.printf(W - 4, ty, id(f_small), id(c_cyan), display::TextAlign::TOP_RIGHT, "%s", scan_s);
