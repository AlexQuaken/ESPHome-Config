substitutions:
  board_name: 'esp32-cam1'
  static_ip: '192.168.0.176'

esphome:
  name: ${board_name}
  on_boot:
    priority: -100
    then:
      - delay: 2s
      - lambda: |-
          auto t = id(homeassistant_time).now();
          if (!t.is_valid()) return;
          if (t.hour >= 7 && t.hour < 23) id(oled).turn_on();
          else id(oled).turn_off();

interval:
  - interval: 60s
    then:
      - lambda: |-
          auto t = id(homeassistant_time).now();
          if (!t.is_valid()) return;
          if (t.hour >= 7 && t.hour < 23) id(oled).turn_on();
          else id(oled).turn_off();

esp32:
  board: esp32cam
  framework:
    type: esp-idf

psram:

packages:
  device_base: !include packages/1wifi_api_ota_logger_mqtt.yaml
  base_sensors: !include packages/2common_sensors.yaml
  led: !include packages/3status_led_esp32.yaml
  esp32cam: !include packages/8esp32-cam.yaml

esp32_camera:
  vertical_flip: true
  horizontal_mirror: true

i2c:
  - id: bus_oled
    sda: GPIO14
    scl: GPIO13
    scan: true
    frequency: 1MHz

font:
  - file: "gfonts://Roboto Mono"
    id: f_console
    size: 8
    glyphs: '!"#$%&''()*+,-./:;<=>?@[\]^_`{|}~0123456789AaBbCcDdEeFfGgHhIiJjKkLlMmNnOoPpQqRrSsTtUuVvWwXxYyZz °'
