substitutions:
  board_name: 'esp32cam-3s-24'
  static_ip: '192.168.0.219'

esphome:
  name: ${board_name}

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf
    sdkconfig_options:
      # Brownout — снижаем порог (камера на старте может проседать питание)
      CONFIG_ESP_BROWNOUT_DET_LVL_SEL_4: "n"
      CONFIG_ESP_BROWNOUT_DET_LVL_SEL_7: "y"
      # WiFi и lwIP на ядро 1, камера на ядре 0
      CONFIG_ESP_WIFI_TASK_PINNED_TO_CORE_1: "y"
      CONFIG_LWIP_TCPIP_TASK_AFFINITY_CPU1: "y"

psram:
  mode: octal
  speed: 80MHz

safe_mode:
  num_attempts: 10
  reboot_timeout: 5min
  boot_is_good_after: 60s


packages:
  device_base: !include packages/1wifi_api_ota_logger.yaml
  base_sensors: !include packages/2common_sensors.yaml
  esp32cam: !include packages/8esp32-cam-s3-freenove.yaml

# WS2812 на GPIO48 — статусный/декоративный индикатор
light:
  - platform: esp32_rmt_led_strip
    chipset: WS2812
    rgb_order: GRB
    pin: GPIO48
    num_leds: 1
    name: ${board_name}_status_led
    id: status_ws2812
    default_transition_length: 0s
