substitutions:
  scan_duration: !secret scan_duration
  update_interval: !secret update_interval
  mifit_alex: !secret mifit_alex
  mifit_ira: !secret mifit_ira
  mifit_lila: !secret mifit_lila
  alex_ble: !secret alex_ble
  ira_ble: !secret ira_ble
  lila_ble: !secret lila_ble
  ibeacon_alex: !secret ibeacon_alex

wifi:
  networks:
    ssid: !secret wifi
    password: !secret wifipwd
  reboot_timeout: 3min
  output_power: 14dB
  fast_connect: false
  manual_ip:
    static_ip: ${static_ip}
    gateway: 192.168.0.1
    subnet: 255.255.255.0
    dns1: 192.168.0.7
    dns2: 192.168.0.1
  ap:
    ssid: ${board_name}_Fallback
    password: !secret wifipwd

api:

ota:
  platform: esphome
  password: !secret wifipwd

logger:

# Кнопка для входа в safe_mode (OTA при тесном heap)
button:
  - platform: safe_mode
    name: ${board_name} Safe Mode (OTA)
    id: btn_safe_mode
