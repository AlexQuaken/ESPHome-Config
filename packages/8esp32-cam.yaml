output:
  - platform: gpio
    pin: GPIO04
    id: GPIO04

light:
  - platform: binary
    output: GPIO04
    name: ${board_name}_light

esp32_camera_web_server:
  - port: 8080
    mode: stream
  - port: 8081
    mode: snapshot

i2c:
  - id: bus_cam
    sda: GPIO26
    scl: GPIO27
    frequency: 100kHz
    scan: false

esp32_camera:
  external_clock:
    pin: GPIO0
    frequency: 20MHz
  i2c_id: bus_cam
  data_pins: [GPIO5, GPIO18, GPIO19, GPIO21, GPIO36, GPIO39, GPIO34, GPIO35]
  vsync_pin: GPIO25
  href_pin: GPIO23
  pixel_clock_pin: GPIO22
  power_down_pin: GPIO32

  name: ${board_name}_Camera
  resolution: 800x600
  jpeg_quality: 12
  max_framerate: 15fps
  idle_framerate: 0.2fps
  frame_buffer_count: 2
  aec2: true
  agc_mode: AUTO
  agc_gain_ceiling: 4x
  aec_mode: AUTO
  ae_level: 0
  wb_mode: AUTO
  vertical_flip: false
  horizontal_mirror: false
