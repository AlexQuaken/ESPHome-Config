# BLE radar + log console для LilyGO T-Display-S3 (ST7789 320x170, i80 parallel).
# Временный пакет — drop-in копия ble_radar.yaml с заменённым display-блоком на
# external_component tdisplays3 (TFT_eSPI обёртка). Существует пока в core ESPHome
# нет нативной поддержки i80 для ili9xxx (PR esphome/esphome#8228). После релиза
# 2026.5+ — рефакторинг с выносом render-lambda в общий пакет и удаление этого
# файла.
#
# Подключение в device.yaml:
#   external_components:
#     - source: github://landonr/lilygo-tdisplays3-esphome
#       components: [tdisplays3]
#   packages:
#     ble_radar: !include packages/ble_radar_tdisplay_s3.yaml
# Никаких pin_* substitutions: у tdisplays3 пины ST7789 i80 зашиты в компоненте
# (CS=6, DC=7, RES=5, WR=8, RD=9, D0..D7=39..48, BL=38).

interval:
  - interval: 1s
    then:
      - lambda: |-
          id(fps_value) = (int)id(frame_counter);
          id(frame_counter) = 0;
  - interval: 10s
    then:
      - lambda: |-
          ESP_LOGI("hb", "up=%lus heap=%uKB fps=%d dev=%u mode=%d", (unsigned long)(millis()/1000), (unsigned)(esp_get_free_heap_size()/1024), id(fps_value), (unsigned)id(dev_addr).size(), id(display_mode));
  - interval: 5s
    then:
      - lambda: |-
          if (id(display_mode) == 0 && millis() > 60000) {
            id(display_mode) = 1;
            id(radar_mode_sw).publish_state(true);
            ESP_LOGI("auto", "Auto-switched to radar mode after 60s");
          }
  # interval target-tracker удалён — вся логика swap делается в crossing-блоке
  # основного render-интервала. target_switch_at используется как "ready-to-swap"
  # timestamp, мишень всегда видна (мигает при потере цели).
  - interval: 1s
    then:
      - lambda: |-
          uint32_t t = millis();
          auto &addrs = id(dev_addr);
          auto &names = id(dev_name);
          auto &rssis = id(dev_rssi);
          auto &rssis0 = id(dev_rssi0);
          auto &seens = id(dev_seen);
          auto &painted = id(dev_painted);
          auto &dists = id(dev_dist);
          if (dists.size() < addrs.size()) dists.resize(addrs.size(), 0);
          auto &scan_ids = id(dev_scan_id);
          if (dists.size() < addrs.size()) dists.resize(addrs.size(), 0);
          if (scan_ids.size() < addrs.size()) scan_ids.resize(addrs.size(), 0);
          for (int i = (int)addrs.size() - 1; i >= 0; i--) {
            if (t - seens[i] > 30000) {
              addrs.erase(addrs.begin() + i);
              names.erase(names.begin() + i);
              rssis.erase(rssis.begin() + i);
              rssis0.erase(rssis0.begin() + i);
              seens.erase(seens.begin() + i);
              painted.erase(painted.begin() + i);
              if (i < (int)dists.size()) dists.erase(dists.begin() + i);
              if (i < (int)scan_ids.size()) scan_ids.erase(scan_ids.begin() + i);
              if (i < (int)id(dev_ang).size()) id(dev_ang).erase(id(dev_ang).begin() + i);
            }
          }
          auto &cache = id(cache_radar_idx);
          cache.clear();
          int uniq = 0;
          std::vector<std::string> seen_macs;
          seen_macs.reserve(addrs.size());
          for (int ii = (int)addrs.size() - 1; ii >= 0; ii--) {
            size_t i = (size_t)ii;
            if (t - seens[i] > 60000) continue;
            bool dup = false;
            for (auto &s : seen_macs) if (s == addrs[i]) { dup = true; break; }
            if (dup) continue;
            seen_macs.push_back(addrs[i]);
            uniq++;
            bool known = (strcasecmp(addrs[i].c_str(), "DE:AD:51:6E:27:C5") == 0
                       || strcasecmp(addrs[i].c_str(), "CE:CD:12:23:1F:64") == 0
                       || strcasecmp(addrs[i].c_str(), "FD:D9:6C:D4:F9:F7") == 0);
            if (known || !names[i].empty()) cache.push_back((int)i);
          }
          id(cache_uniq60) = uniq;

esp32_ble_tracker:
  on_ble_advertise:
    - then:
        - lambda: |-
            std::string addr = x.address_str();
            std::string name = x.get_name();
            int rssi = x.get_rssi();
            uint32_t now = millis();
            auto &addrs = id(dev_addr);
            auto &names = id(dev_name);
            auto &rssis = id(dev_rssi);
            auto &rssis0 = id(dev_rssi0);
            auto &seens = id(dev_seen);
            auto &painted = id(dev_painted);
            for (int i = (int)addrs.size() - 1; i >= 0; i--) {
              if (addrs[i] == addr && now - seens[i] < 2000) {
                rssis[i] = rssi;
                seens[i] = now;
                return;
              }
            }
            bool known = (strcasecmp(addr.c_str(), "DE:AD:51:6E:27:C5") == 0
                       || strcasecmp(addr.c_str(), "CE:CD:12:23:1F:64") == 0
                       || strcasecmp(addr.c_str(), "FD:D9:6C:D4:F9:F7") == 0);
            if (!known && (int)addrs.size() >= 50) return;
            addrs.push_back(addr);
            names.push_back(name);
            rssis.push_back(rssi);
            rssis0.push_back(rssi);
            seens.push_back(now);
            painted.push_back(0);
            {
              uint32_t h = 0;
              for (char c : addr) h = h * 31u + (uint8_t)c;
              id(dev_ang).push_back((float)(h % 360) * 0.0174533f);
            }
            id(scan_counter)++;
            id(dev_scan_id).push_back(id(scan_counter));
            if ((int)addrs.size() > 14) {
              id(scroll_pending_px) += 10;
              if (id(scroll_pending_px) > 40) id(scroll_pending_px) = 40;
            }

# SPI блока нет — i80 шина внутри tdisplays3 external component.
# Backlight через ledc PWM на GPIO38 + light:monochromatic — даёт slider
# яркости в HA. В display: tdisplays3 ставим backlight: false (компонент
# не трогает GPIO38).

output:
  - platform: ledc
    pin: GPIO38
    id: backlight_pwm
    frequency: 5000Hz

light:
  - platform: monochromatic
    output: backlight_pwm
    name: ${board_name} Backlight
    id: backlight
    restore_mode: RESTORE_DEFAULT_ON
    default_transition_length: 300ms

switch:
  - platform: template
    name: ${board_name} Radar Mode
    id: radar_mode_sw
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    turn_on_action:
      - lambda: 'id(display_mode) = 1;'
    turn_off_action:
      - lambda: 'id(display_mode) = 0;'

font:
  - file: "fonts/Tamzen5x9r.ttf"
    id: f_console
    size: 9
    bpp: 1
    glyphs: '!"#$%&''()*+,-./:;<=>?@[\]^_`{|}~0123456789AaBbCcDdEeFfGgHhIiJjKkLlMmNnOoPpQqRrSsTtUuVvWwXxYyZz °'

color:
  - id: c_green
    red: 0%
    green: 100%
    blue: 0%
  - id: c_dim
    red: 0%
    green: 30%
    blue: 0%
  - id: c_amber
    red: 100%
    green: 70%
    blue: 0%
  - id: c_black
    red: 0%
    green: 0%
    blue: 0%

globals:
  - id: log_lines
    type: std::vector<std::string>
    restore_value: no
  - id: log_max
    type: int
    restore_value: no
    initial_value: '18'
  - id: scroll_off
    type: float
    restore_value: no
    initial_value: '0.0'
  - id: scroll_start_ms
    type: uint32_t
    restore_value: no
    initial_value: '0'
  - id: anim_ms
    type: uint32_t
    restore_value: no
    initial_value: '500'
  - id: pending_line
    type: std::string
    restore_value: no
  - id: pending_time
    type: uint32_t
    restore_value: no
    initial_value: '0'
  - id: has_pending
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: dev_addr
    type: std::vector<std::string>
    restore_value: no
  - id: dev_name
    type: std::vector<std::string>
    restore_value: no
  - id: dev_rssi
    type: std::vector<int>
    restore_value: no
  - id: dev_rssi0
    type: std::vector<int>
    restore_value: no
  - id: dev_seen
    type: std::vector<uint32_t>
    restore_value: no
  - id: dev_painted
    type: std::vector<uint32_t>
    restore_value: no
  - id: dev_ang
    type: std::vector<float>
    restore_value: no
  - id: target_mac
    type: std::string
    restore_value: no
  - id: target_switch_at
    type: uint32_t
    restore_value: no
    initial_value: '0'
  - id: target_anim_start
    type: uint32_t
    restore_value: no
    initial_value: '0'
  - id: target_prev_x
    type: float
    restore_value: no
    initial_value: '0.0'
  - id: target_prev_y
    type: float
    restore_value: no
    initial_value: '0.0'
  - id: target_hist_0
    type: std::string
    restore_value: no
  - id: target_hist_1
    type: std::string
    restore_value: no
  - id: target_hist_2
    type: std::string
    restore_value: no
  - id: dev_dist
    type: std::vector<int>
    restore_value: no
  - id: dev_scan_id
    type: std::vector<uint16_t>
    restore_value: no
  - id: scan_counter
    type: uint16_t
    restore_value: no
    initial_value: '0'
  - id: prev_sweep
    type: float
    restore_value: no
    initial_value: '0.0'
  - id: scroll_anim_start
    type: uint32_t
    restore_value: no
    initial_value: '0'
  - id: scroll_pending_px
    type: int
    restore_value: no
    initial_value: '0'
  - id: cache_uniq60
    type: int
    restore_value: no
    initial_value: '0'
  - id: cache_radar_idx
    type: std::vector<int>
    restore_value: no
  - id: display_mode
    type: int
    restore_value: no
    initial_value: '0'
  - id: frame_counter
    type: uint32_t
    restore_value: no
    initial_value: '0'
  - id: fps_value
    type: int
    restore_value: no
    initial_value: '0'

logger:
  level: DEBUG
  logs:
    font: ERROR
    display: ERROR
    tdisplays3: ERROR
    component: ERROR
    scheduler: ERROR
    mqtt: ERROR
    mqtt.idf: ERROR
    mqtt.client: ERROR
    esp32_ble_tracker: DEBUG
    esp32_ble: INFO
  on_message:
    level: DEBUG
    then:
      - lambda: |-
          std::string t = tag ? tag : "";
          if (t.find("font") != std::string::npos) return;
          if (t.find("display") != std::string::npos) return;
          if (t.find("mqtt") != std::string::npos) return;
          std::string raw;
          for (size_t i = 0; message[i] != 0; i++) {
            unsigned char c = (unsigned char)message[i];
            if (c == 0x1B) { while (message[i] != 0 && message[i] != 'm') i++; continue; }
            if (c == '\r' || c == '\n') continue;
            if (c < 0x20 || c > 0x7E) continue;
            raw += (char)c;
          }
          auto p = raw.find("]: ");
          if (p != std::string::npos) raw = raw.substr(p + 3);
          std::string clean;
          for (char c : raw) if (c != '\'') clean += c;
          if (clean.empty()) return;
          uint32_t now = millis();
          auto &v = id(log_lines);
          const int LINE_H = 9;
          const int FRAME_MS = 16;
          if (id(has_pending)) {
            if (id(scroll_off) > 0 && id(scroll_off) < LINE_H && (int)v.size() > id(log_max)) {
              v.erase(v.begin());
              id(scroll_off) = 0;
            }
            v.push_back(id(pending_line));
            while ((int)v.size() > 40) v.erase(v.begin());
            if ((int)v.size() > id(log_max)) {
              id(anim_ms) = LINE_H * FRAME_MS;
              id(scroll_start_ms) = now;
              id(scroll_off) = 0.0f;
            }
          }
          id(pending_line) = clean;
          id(pending_time) = now;
          id(has_pending) = true;

api:
  services:
    - service: console_log
      variables:
        line: string
      then:
        - lambda: |-
            auto &v = id(log_lines);
            std::string s = line;
            if (s.size() > 30) s = s.substr(0, 30);
            v.push_back(s);
            while ((int)v.size() > id(log_max)) v.erase(v.begin());
        - component.update: lcd
    - service: console_clear
      then:
        - lambda: 'id(log_lines).clear();'
        - component.update: lcd
    - service: set_display_mode
      variables:
        mode: int
      then:
        - lambda: 'id(display_mode) = mode;'

display:
  - platform: tdisplays3
    id: lcd
    # width/height не указываем — defaults 170x320 (native ST7789 portrait).
    # rotation:270 поворачивает в render-time → it.get_width()=320, get_height()=170.
    rotation: 270
    backlight: false  # GPIO38 управляется через ledc выше (light:monochromatic)
    update_interval: 33ms
    lambda: |-
      id(frame_counter)++;
      uint32_t t = millis();
      int W = it.get_width();
      int H = it.get_height();

      if (id(display_mode) == 0) {
        // ============ LOG CONSOLE MODE ============
        const int LINE_H = 9;
        const int FRAME_MS = 16;
        const int GAP = 40;
        const int CLOCK_GAP = 10;
        auto &v = id(log_lines);
        if ((int)v.size() > id(log_max)) {
          uint32_t elapsed = t - id(scroll_start_ms);
          float o = (float)elapsed * (float)LINE_H / (float)id(anim_ms);
          if (o > (float)LINE_H) o = (float)LINE_H;
          id(scroll_off) = o;
          if (o >= (float)LINE_H) { v.erase(v.begin()); id(scroll_off) = 0.0f; }
        }
        int n = (int)v.size();
        int yoff = (int)(id(scroll_off) + 0.5f);

        char clk[32];
        auto tn = id(homeassistant_time).now();
        unsigned msec = (unsigned)(t % 1000);
        if (tn.is_valid()) {
          snprintf(clk, sizeof(clk), "%02d:%02d:%02d %03u", tn.hour, tn.minute, tn.second, msec);
        } else {
          snprintf(clk, sizeof(clk), "--:--:-- %03u", msec);
        }
        int cw = (int)strlen(clk) * 5;
        int line_w_top = W - cw - CLOCK_GAP;
        if (line_w_top < 1) line_w_top = 1;

        const int TOP_PAD = 0;
        for (int i = 0; i < n; i++) {
          int y = i * LINE_H - yoff + TOP_PAD;
          if (y >= H) continue;
          if (y + LINE_H <= 0) continue;
          auto &s = v[i];
          int w = (int)s.size() * 5;
          int avail = (y < LINE_H + TOP_PAD) ? line_w_top : W;
          if (w <= avail) {
            it.printf(0, y, id(f_console), id(c_green), "%s", s.c_str());
          } else {
            int cycle = w + GAP;
            int off_x = ((int)(t * 0.075f)) % cycle;
            it.printf(-off_x, y, id(f_console), id(c_green), "%s", s.c_str());
            it.printf(-off_x + cycle, y, id(f_console), id(c_green), "%s", s.c_str());
          }
        }

        if (id(has_pending)) {
          int y = n * LINE_H - yoff + TOP_PAD;
          if (y < H && y + LINE_H > 0) {
            auto &s = id(pending_line);
            int w = (int)s.size() * 5;
            int avail = (y < LINE_H + TOP_PAD) ? line_w_top : W;
            if (w <= avail) {
              it.printf(0, y, id(f_console), id(c_green), "%s", s.c_str());
            } else {
              int cycle = w + GAP;
              int off_x = ((int)(t * 0.075f)) % cycle;
              it.printf(-off_x, y, id(f_console), id(c_green), "%s", s.c_str());
              it.printf(-off_x + cycle, y, id(f_console), id(c_green), "%s", s.c_str());
            }
          }
        }

        it.filled_rectangle(line_w_top, 0, W - line_w_top, LINE_H, id(c_black));
        it.printf(W, 0, id(f_console), id(c_green), TextAlign::TOP_RIGHT, "%s", clk);
      } else {
        // ============ BLE RADAR MODE ============
        const int cx = 80;
        const int cy = 85;
        const int max_r = 70;

        float sw = (float)(t % 6000) / 6000.0f * 6.28318f;
        const int TRAIL_SEG = 22;
        const float SEG_ANGLE = 0.06f;
        for (int i = TRAIL_SEG; i >= 1; i--) {
          float a1 = sw - (float)i * SEG_ANGLE;
          float a2 = sw - (float)(i - 1) * SEG_ANGLE;
          int p1x = cx + (int)(cosf(a1) * (float)max_r);
          int p1y = cy + (int)(sinf(a1) * (float)max_r);
          int p2x = cx + (int)(cosf(a2) * (float)max_r);
          int p2y = cy + (int)(sinf(a2) * (float)max_r);
          int intensity = 180 - i * 9;
          if (intensity < 12) intensity = 12;
          it.filled_triangle(cx, cy, p1x, p1y, p2x, p2y, Color(0, intensity, 0));
        }
        int sx0 = cx + (int)(cosf(sw) * (float)max_r);
        int sy0 = cy + (int)(sinf(sw) * (float)max_r);
        it.line(cx, cy, sx0, sy0, Color(140, 255, 140));

        // 5 кругов RSSI: радиусы соответствуют RSSI -50..-110 dBm (шаг 15).
        // Внешний (-110) без подписи — границу понятно так.
        it.circle(cx, cy, 14, id(c_dim));
        it.circle(cx, cy, 28, id(c_dim));
        it.circle(cx, cy, 42, id(c_dim));
        it.circle(cx, cy, 56, id(c_dim));
        it.circle(cx, cy, max_r, id(c_green));

        // Крест ПОСЛЕ кругов и trail — чтобы оси были видны поверх свечения
        it.line(cx - max_r, cy, cx + max_r, cy, id(c_dim));
        it.line(cx, cy - max_r, cx, cy + max_r, id(c_dim));

        // Подписи RSSI на верхней части вертикали креста, со сдвигом вправо
        // на 2 px от вертикальной линии — чтобы линия креста не перекрывала
        // цифры. Без знака минус, компактно по 2 символа.
        it.printf(cx + 2, cy - 14 - 9, id(f_console), id(c_dim), "50");
        it.printf(cx + 2, cy - 28 - 9, id(f_console), id(c_dim), "65");
        it.printf(cx + 2, cy - 42 - 9, id(f_console), id(c_dim), "80");
        it.printf(cx + 2, cy - 56 - 9, id(f_console), id(c_dim), "95");

        auto &addrs = id(dev_addr);
        auto &names = id(dev_name);
        auto &rssis = id(dev_rssi);
        auto &rssis0 = id(dev_rssi0);
        auto &seens = id(dev_seen);
        auto &painted = id(dev_painted);
        auto &angs = id(dev_ang);

        float prev = id(prev_sweep);
        auto &dists = id(dev_dist);
        if (dists.size() < addrs.size()) dists.resize(addrs.size(), 0);
        if (angs.size() < addrs.size()) angs.resize(addrs.size(), 0.0f);
        for (size_t i = 0; i < addrs.size(); i++) {
          float ang = angs[i];
          bool crossed = false;
          if (prev <= sw) {
            if (ang > prev && ang <= sw) crossed = true;
          } else {
            if (ang > prev || ang <= sw) crossed = true;
          }
          if (crossed) {
            painted[i] = t;
            int r = rssis[i];
            int d = 14 + ((-50 - r) * 56) / 60;
            if (d < 14) d = 14;
            if (d > 70) d = 70;
            dists[i] = d;
            // Capture свежего unknown crossing на target. Срабатывает если
            // cooldown истёк ИЛИ текущая цель потеряна. Исключаем known,
            // history последних трёх и self-capture.
            {
              const std::string &m = addrs[i];
              bool is_known = (strcasecmp(m.c_str(), "DE:AD:51:6E:27:C5") == 0
                            || strcasecmp(m.c_str(), "CE:CD:12:23:1F:64") == 0
                            || strcasecmp(m.c_str(), "FD:D9:6C:D4:F9:F7") == 0);
              const std::string &h0 = id(target_hist_0);
              const std::string &h1 = id(target_hist_1);
              const std::string &h2 = id(target_hist_2);
              bool in_history = (m == h0 || m == h1 || m == h2);
              const std::string &cur_mac = id(target_mac);
              bool cur_alive = false;
              if (!cur_mac.empty()) {
                for (size_t k = 0; k < addrs.size(); k++) {
                  if (addrs[k] == cur_mac) { cur_alive = true; break; }
                }
              }
              bool ready = (t >= id(target_switch_at)) || !cur_alive;
              if (!is_known && !in_history && ready && cur_mac != m) {
                if ((esp_random() & 1) == 0) {
                  id(target_hist_2) = id(target_hist_1);
                  id(target_hist_1) = id(target_hist_0);
                  id(target_hist_0) = m;
                  id(target_mac) = m;
                  // Hold 3-5 сек до следующего swap
                  id(target_switch_at) = t + 3000 + (esp_random() % 2000);
                }
              }
            }
          }
        }
        id(prev_sweep) = sw;

        auto &radar_idx = id(cache_radar_idx);
        // Сортируем radar_idx так, чтобы известные (Alex/Ira/Lila) шли первыми —
        // тогда unknown точки в Pass 2 видят их bbox и обходят радиально.
        std::stable_sort(radar_idx.begin(), radar_idx.end(), [&](int a, int b) {
          auto is_kn = [&](int idx) {
            if (idx < 0 || (size_t)idx >= addrs.size()) return false;
            const char *s = addrs[idx].c_str();
            return strcasecmp(s, "DE:AD:51:6E:27:C5") == 0
                || strcasecmp(s, "CE:CD:12:23:1F:64") == 0
                || strcasecmp(s, "FD:D9:6C:D4:F9:F7") == 0;
          };
          return (int)is_kn(a) > (int)is_kn(b);
        });
        // Bbox-ы всех размещённых элементов на радаре — для collision-check.
        // Pre-fill: 4 подписи кругов 50/65/80/95 (на cy-r-9, шрифт 10x9).
        // Дальше при рендере точек и labels добавляются их bbox (max 24).
        int bb_n = 4;
        int bb_x[24] = {cx + 2, cx + 2, cx + 2, cx + 2};
        int bb_y[24] = {cy - 14 - 9, cy - 28 - 9, cy - 42 - 9, cy - 56 - 9};
        int bb_w[24] = {10, 10, 10, 10};
        int bb_h[24] = {9, 9, 9, 9};
        const int LABEL_H = 18;  // 2 строки по 9px (имя + R:rssi)
        auto overlap_any = [&](int x, int y, int w, int h) -> int {
          for (int k = 0; k < bb_n; k++) {
            if (x < bb_x[k] + bb_w[k] + 1 && x + w + 1 > bb_x[k] &&
                y < bb_y[k] + bb_h[k] + 1 && y + h + 1 > bb_y[k]) return k;
          }
          return -1;
        };
        auto add_bb = [&](int x, int y, int w, int h) {
          if (bb_n < 24) { bb_x[bb_n] = x; bb_y[bb_n] = y; bb_w[bb_n] = w; bb_h[bb_n] = h; bb_n++; }
        };
        for (int idx_pos = 0; idx_pos < (int)radar_idx.size(); idx_pos++) {
          size_t i = (size_t)radar_idx[idx_pos];
          if (i >= addrs.size()) continue;
          const char* label = nullptr;
          if (strcasecmp(addrs[i].c_str(), "DE:AD:51:6E:27:C5") == 0) label = "ALEX";
          else if (strcasecmp(addrs[i].c_str(), "CE:CD:12:23:1F:64") == 0) label = "IRA";
          else if (strcasecmp(addrs[i].c_str(), "FD:D9:6C:D4:F9:F7") == 0) label = "LILA";
          bool known = (label != nullptr);
          int intensity;
          int dot_r;
          if (known) {
            // Alex/Ira/Lila — пока в массиве (т.е. видим в последние 30 сек) —
            // светятся всегда, без зависимости от sweep.
            intensity = 240;
            dot_r = 3;
          } else {
            if (painted[i] == 0) continue;  // sweep ещё не зацепил это устройство
            // Затухание с момента последнего прохода sweep, период = 6 сек (один оборот).
            // На следующем обороте painted[i] обновится → яркость "вспышкой" вернётся.
            uint32_t age = t - painted[i];
            if (age > 6000) age = 6000;
            intensity = 240 - (int)((age * 204) / 6000);  // 240 → 36 (~15%)
            if (intensity < 36) intensity = 36;
            dot_r = (age < 200) ? 3 : 2;
          }
          int dist = (i < id(dev_dist).size()) ? id(dev_dist)[i] : 0;
          if (dist == 0) {
            int r = rssis[i];
            dist = 14 + ((-50 - r) * 56) / 60;
            if (dist < 14) dist = 14;
            if (dist > max_r) dist = max_r;
          }
          float ang = (i < angs.size()) ? angs[i] : 0.0f;
          int dot_w = dot_r * 2 + 1;
          const int M = 4;
          int x_min = cx - max_r + M;
          int x_max = cx + max_r - M;
          int y_min = M;
          int y_max = cy + max_r - M;

          if (known) {
            // Known: единый блок [точка][gap][2 строки текста]. Точка ВСЕГДА слева,
            // текст ВСЕГДА справа — без зеркалирования. При коллизии или overflow
            // блок целиком сдвигается: сначала радиально (dist±), затем углом (ang±),
            // затем комбинации. Точка может уйти с истинной позиции по RSSI на
            // 5-15 px ради читаемости.
            int rssi_val = (i < rssis.size()) ? rssis[i] : -99;
            char rssi_s[8];
            snprintf(rssi_s, sizeof(rssi_s), "R:%d", rssi_val);
            int name_w = (int)strlen(label) * 5;
            int rssi_w = (int)strlen(rssi_s) * 5;
            int text_w = (name_w > rssi_w) ? name_w : rssi_w;
            const int GAP = 2;
            int block_w = dot_w + GAP + text_w;
            int block_h = LABEL_H;
            const float dist_steps[] = {0, 3, -3, 6, -6, 10, -10, 0, 0, 6, -6};
            const float ang_steps[]  = {0, 0,  0, 0,  0,  0,   0, 0.20f, -0.20f, 0.20f, -0.20f};
            int block_left = 0, block_top = 0, dx_use = 0, label_x = 0;
            bool placed = false;
            int last_left = 0, last_top = 0, last_dx = 0, last_lx = 0;
            for (int g = 0; g < 11; g++) {
              int try_dist = dist + (int)dist_steps[g];
              float try_ang = ang + ang_steps[g];
              if (try_dist < 4) try_dist = 4;
              if (try_dist > max_r) try_dist = max_r;
              int tdx = cx + (int)(cosf(try_ang) * (float)try_dist);
              int tdy = cy + (int)(sinf(try_ang) * (float)try_dist);
              int tbl = tdx - dot_r;
              int tbt = tdy - 4;
              if (tbl < x_min) tbl = x_min;
              if (tbl + block_w > x_max) tbl = x_max - block_w;
              if (tbt < y_min) tbt = y_min;
              if (tbt + block_h > y_max) tbt = y_max - block_h;
              int tdx_use = tbl + dot_r;
              int tlx = tdx_use + dot_r + GAP;
              last_left = tbl; last_top = tbt; last_dx = tdx_use; last_lx = tlx;
              if (overlap_any(tbl, tbt, block_w, block_h) < 0) {
                block_left = tbl; block_top = tbt;
                dx_use = tdx_use; label_x = tlx;
                placed = true;
                break;
              }
            }
            if (!placed) {
              block_left = last_left; block_top = last_top;
              dx_use = last_dx; label_x = last_lx;
            }
            int draw_dy = block_top + 4;
            it.filled_circle(dx_use, draw_dy, dot_r, Color(0, intensity, 0));
            it.printf(label_x, block_top, id(f_console), Color(0, intensity, 0), "%s", label);
            it.printf(label_x, block_top + 9, id(f_console), Color(0, intensity, 0), "%s", rssi_s);
            add_bb(block_left, block_top, block_w, block_h);
          } else {
            // Unknown: только точка. Большой набор попыток обхода —
            // комбинации радиальных и угловых сдвигов, до 11 вариантов.
            const float u_dist_steps[] = {0, 5, -5, 10, -10, 15, 0, 0, 8, -8, 12};
            const float u_ang_steps[]  = {0, 0,  0,  0,   0,  0, 0.12f, -0.12f, 0.12f, -0.12f, 0.20f};
            int dx = cx + (int)(cosf(ang) * (float)dist);
            int dy = cy + (int)(sinf(ang) * (float)dist);
            for (int g = 0; g < 11; g++) {
              if (overlap_any(dx - dot_r, dy - dot_r, dot_w, dot_w) < 0) break;
              int try_dist = dist + (int)u_dist_steps[g];
              float try_ang = ang + u_ang_steps[g];
              if (try_dist < 4) try_dist = 4;
              if (try_dist > max_r) try_dist = max_r;
              dx = cx + (int)(cosf(try_ang) * (float)try_dist);
              dy = cy + (int)(sinf(try_ang) * (float)try_dist);
            }
            it.filled_circle(dx, dy, dot_r, Color(0, intensity, 0));
            add_bb(dx - dot_r, dy - dot_r, dot_w, dot_w);
          }
        }

        // Жёлтый target: всегда виден. Lerp 12% за кадр к цели если она в
        // addrs; если потеряна — мигает на target_prev_x/y (последняя позиция)
        // и ждёт пока crossing-блок захватит новую цель.
        {
          const std::string &tmac = id(target_mac);
          int tidx = -1;
          if (!tmac.empty()) {
            for (size_t k = 0; k < addrs.size(); k++) {
              if (addrs[k] == tmac) { tidx = (int)k; break; }
            }
          }
          bool alive = (tidx >= 0);
          if (alive) {
            float ta = (tidx < (int)angs.size()) ? angs[tidx] : 0.0f;
            int td = (tidx < (int)dists.size()) ? dists[tidx] : 0;
            if (td == 0) {
              int r = rssis[tidx];
              td = 14 + ((-50 - r) * 56) / 60;
              if (td < 14) td = 14;
              if (td > max_r) td = max_r;
            }
            float tgt_x = (float)cx + cosf(ta) * (float)td;
            float tgt_y = (float)cy + sinf(ta) * (float)td;
            id(target_prev_x) += (tgt_x - id(target_prev_x)) * 0.12f;
            id(target_prev_y) += (tgt_y - id(target_prev_y)) * 0.12f;
          }
          // Pre-init: если позиция в (0,0) при первом запуске — стартуем с центра
          if (id(target_prev_x) < 1.0f && id(target_prev_y) < 1.0f) {
            id(target_prev_x) = (float)cx;
            id(target_prev_y) = (float)cy;
          }
          int tx = (int)id(target_prev_x);
          int ty = (int)id(target_prev_y);
          // Blink при потере цели: рисуем 300ms из 500ms
          bool draw = alive || ((t / 250) % 2 == 0);
          if (draw) {
            Color tc = Color(255, 220, 0);
            it.line(tx - 5, ty - 5, tx - 3, ty - 5, tc);
            it.line(tx - 5, ty - 5, tx - 5, ty - 3, tc);
            it.line(tx + 2, ty - 5, tx + 4, ty - 5, tc);
            it.line(tx + 4, ty - 5, tx + 4, ty - 3, tc);
            it.line(tx - 5, ty + 2, tx - 5, ty + 4, tc);
            it.line(tx - 5, ty + 4, tx - 3, ty + 4, tc);
            it.line(tx + 2, ty + 4, tx + 4, ty + 4, tc);
            it.line(tx + 4, ty + 2, tx + 4, ty + 4, tc);
          }
        }

        int sb_x = 168;
        it.printf(sb_x + 2, 1, id(f_console), id(c_green), "SCAN");
        it.printf(sb_x + 56, 1, id(f_console), id(c_green), "NAME");
        it.printf(sb_x + 119, 1, id(f_console), id(c_green), "RSSI");

        const int sb_y_start = 14;
        const int row_h = 10;
        const int visible_rows = 14;
        const int sb_y_end = sb_y_start + visible_rows * row_h;
        int N = (int)addrs.size();
        int skip = (N > visible_rows) ? (N - visible_rows) : 0;

        if (id(scroll_pending_px) > 0) id(scroll_pending_px) -= 1;
        if (id(scroll_pending_px) < 0) id(scroll_pending_px) = 0;
        int anim_y = id(scroll_pending_px);
        int extra = (anim_y + row_h - 1) / row_h;
        int render_from = skip - extra;
        if (render_from < 0) render_from = 0;

        it.start_clipping(Rect(sb_x - 3, 12, W - sb_x + 3, sb_y_end - 12));
        for (int i = render_from; i < N; i++) {
          size_t k = (size_t)i;
          int row_y = sb_y_start + (i - skip) * row_h + anim_y;
          if (row_y + row_h <= 0) continue;
          if (row_y > sb_y_end) continue;
          std::string nm = names[k];
          if (nm.empty()) nm = addrs[k];
          uint16_t scan_id = (k < id(dev_scan_id).size()) ? id(dev_scan_id)[k] : 0;
          char sc[8];
          snprintf(sc, sizeof(sc), "%04X", scan_id);
          int r0 = (k < rssis0.size()) ? rssis0[k] : rssis[k];

          it.printf(sb_x + 1, row_y, id(f_console), id(c_green), "%s", sc);

          int name_x = sb_x + 25;
          int name_w = 85;
          if ((int)nm.size() <= 17) {
            it.printf(name_x, row_y, id(f_console), id(c_green), "%s", nm.c_str());
          } else {
            std::string padded = nm + "   ";
            int cycle_px = (int)padded.size() * 5;
            int off_px = (int)((t / 50) % (uint32_t)cycle_px);
            it.start_clipping(Rect(name_x, row_y, name_w, row_h));
            it.printf(name_x - off_px, row_y, id(f_console), id(c_green), "%s", padded.c_str());
            it.printf(name_x - off_px + cycle_px, row_y, id(f_console), id(c_green), "%s", padded.c_str());
            it.end_clipping();
          }

          char rb[12];
          snprintf(rb, sizeof(rb), "%4d dB", r0);
          it.printf(sb_x + 113, row_y, id(f_console), id(c_green), "%s", rb);
        }
        it.end_clipping();

        const int col1_x = sb_x + 22;
        const int col2_x = sb_x + 110;
        const int bottom_y = 169;
        it.line(col1_x, 0, col1_x, sb_y_end, id(c_dim));
        it.line(col2_x, 0, col2_x, sb_y_end, id(c_dim));
        it.line(sb_x - 4, 0, sb_x - 4, bottom_y, id(c_dim));
        it.line(W - 1, 0, W - 1, bottom_y, id(c_dim));
        it.line(sb_x - 4, 0, W - 1, 0, id(c_dim));
        it.line(sb_x - 4, 11, W - 1, 11, id(c_dim));
        it.line(sb_x - 4, sb_y_end, W - 1, sb_y_end, id(c_dim));
        it.line(sb_x - 4, bottom_y, W - 1, bottom_y, id(c_dim));

        char clk[16];
        auto tn = id(homeassistant_time).now();
        if (tn.is_valid()) snprintf(clk, sizeof(clk), "%02d:%02d:%02d", tn.hour, tn.minute, tn.second);
        else snprintf(clk, sizeof(clk), "--:--:--");
        it.printf(0, 1, id(f_console), id(c_green), "%s", clk);
        char fps_s[16];
        snprintf(fps_s, sizeof(fps_s), "FPS:%d", id(fps_value));
        int fw = (int)strlen(fps_s) * 5;
        it.filled_rectangle(0, 11, fw + 2, 9, id(c_black));
        it.printf(0, 11, id(f_console), id(c_green), "%s", fps_s);
        char dt[24];
        if (tn.is_valid()) snprintf(dt, sizeof(dt), "%04d.%02d.%02d", tn.year, tn.month, tn.day_of_month);
        else snprintf(dt, sizeof(dt), "----.--.--");
        it.printf(sb_x - 6, 1, id(f_console), id(c_green), TextAlign::TOP_RIGHT, "%s", dt);
        char bld[8];
        snprintf(bld, sizeof(bld), "%c%c:%c%c", __TIME__[0], __TIME__[1], __TIME__[3], __TIME__[4]);
        it.filled_rectangle(0, 151, 27, 9, id(c_black));
        it.printf(0, 151, id(f_console), id(c_green), "%s", bld);
        it.printf(0, 160, id(f_console), id(c_green), "BLE RADAR");
        char mem[16];
        snprintf(mem, sizeof(mem), "MEM %uK", (unsigned)(esp_get_free_heap_size() / 1024));
        it.printf(sb_x - 6, 160, id(f_console), id(c_green), TextAlign::TOP_RIGHT, "%s", mem);
        char devc[24];
        snprintf(devc, sizeof(devc), "Found: %u/min", (unsigned)id(cache_uniq60));
        it.printf(sb_x + 1, 160, id(f_console), id(c_green), "%s", devc);
        uint32_t up_s = t / 1000;
        unsigned d = up_s / 86400, h = (up_s % 86400) / 3600, m = (up_s % 3600) / 60, ss = up_s % 60;
        char upbuf[32];
        if (d > 0) snprintf(upbuf, sizeof(upbuf), "Up: %ud %02u:%02u", d, h, m);
        else snprintf(upbuf, sizeof(upbuf), "Up: %02u:%02u:%02u", h, m, ss);
        it.printf(W - 2, 160, id(f_console), id(c_green), TextAlign::TOP_RIGHT, "%s", upbuf);
        const int footer_sep_x = (sb_x - 4 + W - 1) / 2;
        it.line(footer_sep_x, sb_y_end + 1, footer_sep_x, 168, id(c_dim));
      }
