# PZEM electricity dashboard для ST7789 1.9" 320x170
# 4 карточки сверху (NOW W / TODAY kWh / PF / DateTime) + 60-min chart с PF-line
# Подключение:
#   substitutions:
#     pin_clk: GPIO14
#     pin_mosi: GPIO27
#     pin_cs: GPIO33
#     pin_dc: GPIO25
#     pin_reset: GPIO26
#     pin_bl: GPIO32
#   packages:
#     pzem_dashboard: !include packages/pzem_dashboard.yaml
# HA REST endpoint и token берутся из secrets: ha_url, ha_token

substitutions:
  ha_url: !secret ha_url
  ha_token: !secret ha_token
  # дефолты ориентации экрана (esp32-21). Для поворота на 180° задать в device.yaml: mirror_x: "false", mirror_y: "true"
  mirror_x: "true"
  mirror_y: "false"

esp32:
  framework:
    sdkconfig_options:
      CONFIG_BT_CONTROLLER_MODE_BLE_ONLY: y
      CONFIG_LWIP_MAX_SOCKETS: "20"

interval:
  - interval: 1s
    then:
      - lambda: |-
          id(fps_value) = (int)id(frame_counter);
          id(frame_counter) = 0;
  - interval: 15s
    then:
      - lambda: |-
          auto push_sample = [](std::vector<float> &buf, float v) {
            if (!std::isfinite(v)) {
              if (buf.empty()) return;
              v = buf.back();
            }
            buf.push_back(v);
            while (buf.size() > 240) buf.erase(buf.begin());
          };
          push_sample(id(buf_p),  id(pzem_p).state);
          push_sample(id(buf_pf), id(pzem_pf).state);
          push_sample(id(buf_e),  id(energy_day).state);
  - interval: 60s
    then:
      - lambda: |-
          ESP_LOGI("hb", "up=%lus heap=%uKB fps=%d P=%.0fW E=%.2fkWh PF=%.2f buf=%d/%d",
            (unsigned long)(millis()/1000),
            (unsigned)(esp_get_free_heap_size()/1024),
            id(fps_value),
            id(pzem_p).state, id(energy_day).state, id(pzem_pf).state,
            (int)id(buf_p).size(), (int)id(buf_pf).size());

api:
  max_connections: 12

http_request:
  useragent: ${board_name}
  timeout: 15s
  verify_ssl: false

sensor:
  - platform: homeassistant
    id: pzem_p
    entity_id: sensor.pzem_power
    internal: true
  - platform: homeassistant
    id: pzem_pf
    entity_id: sensor.pzem_power_factor
    internal: true
  - platform: homeassistant
    id: energy_day
    entity_id: sensor.energy_day
    internal: true

globals:
  - id: buf_p
    type: std::vector<float>
    restore_value: no
  - id: buf_pf
    type: std::vector<float>
    restore_value: no
  - id: buf_e
    type: std::vector<float>
    restore_value: no
  - id: frame_counter
    type: uint32_t
    restore_value: no
    initial_value: '0'
  - id: fps_value
    type: int
    restore_value: no
    initial_value: '0'
  - id: load_target_idx
    type: int
    restore_value: no
    initial_value: '0'

script:
  - id: load_history
    mode: single
    then:
      - lambda: 'id(load_target_idx) = 0;'
      - script.execute: load_history_entity
      - script.wait: load_history_entity
      - lambda: 'id(load_target_idx) = 1;'
      - script.execute: load_history_entity
      - script.wait: load_history_entity
      - lambda: 'id(load_target_idx) = 2;'
      - script.execute: load_history_entity
  - id: load_history_entity
    mode: single
    then:
      - http_request.get:
          max_response_buffer_size: 12288
          url: !lambda |-
            auto t = id(homeassistant_time).now();
            time_t now_t = t.timestamp;
            time_t from_t = now_t - 60*60;
            struct tm tmf;
            gmtime_r(&from_t, &tmf);
            char from_iso[40];
            strftime(from_iso, sizeof(from_iso), "%Y-%m-%dT%H:%M:%S+00:00", &tmf);
            const char* eid = "sensor.pzem_power";
            if (id(load_target_idx) == 1) eid = "sensor.pzem_power_factor";
            else if (id(load_target_idx) == 2) eid = "sensor.energy_day";
            std::string url = std::string("${ha_url}/api/history/period/") + from_iso +
              "?filter_entity_id=" + eid +
              "&minimal_response&no_attributes&significant_changes_only=false";
            return url;
          request_headers:
            Authorization: 'Bearer ${ha_token}'
          capture_response: true
          on_response:
            then:
              - lambda: |-
                  if (body.empty() || body.size() < 4) return;
                  auto iso_to_utc = [](int y, int mo, int d, int h, int mi, int s) -> time_t {
                    static const int dom[] = {0,31,59,90,120,151,181,212,243,273,304,334};
                    long days = (y-1970)*365L + (y-1969)/4 - (y-1901)/100 + (y-1601)/400;
                    days += dom[mo-1] + (d-1);
                    bool leap = (y%4==0 && (y%100!=0 || y%400==0));
                    if (mo > 2 && leap) days++;
                    return (time_t)(days*86400L + h*3600 + mi*60 + s);
                  };
                  const char* p = body.c_str();
                  size_t blen = body.size();
                  struct TPair { time_t t; float v; };
                  std::vector<TPair> pairs;
                  pairs.reserve(200);
                  size_t pos = 0;
                  float last_v = 0.0f;
                  while (pos + 9 < blen) {
                    if (p[pos] == '"' && memcmp(p + pos, "\"state\":\"", 9) == 0) {
                      pos += 9;
                      last_v = atof(p + pos);
                      while (pos < blen && p[pos] != '"') pos++;
                      pos++;
                    } else if (p[pos] == '"' && pos + 16 < blen && memcmp(p + pos, "\"last_changed\":\"", 16) == 0) {
                      pos += 16;
                      int yr, mo, dy, hr, mi, sc;
                      if (sscanf(p + pos, "%d-%d-%dT%d:%d:%d", &yr, &mo, &dy, &hr, &mi, &sc) == 6 && std::isfinite(last_v)) {
                        pairs.push_back({iso_to_utc(yr, mo, dy, hr, mi, sc), last_v});
                      }
                      while (pos < blen && p[pos] != '"') pos++;
                      pos++;
                    } else {
                      pos++;
                    }
                  }
                  std::vector<float>* target = &id(buf_p);
                  if (id(load_target_idx) == 1) target = &id(buf_pf);
                  else if (id(load_target_idx) == 2) target = &id(buf_e);
                  auto tn = id(homeassistant_time).now();
                  time_t t_now = tn.is_valid() ? tn.timestamp : (pairs.empty() ? 0 : pairs.back().t);
                  time_t t_from = t_now - 3600;
                  target->assign(240, NAN);
                  for (auto &pr : pairs) {
                    long off = (long)(pr.t - t_from);
                    if (off < 0 || off >= 3600) continue;
                    int b = (int)(off / 15);
                    if (b >= 0 && b < 240) (*target)[b] = pr.v;
                  }
                  float lv = NAN;
                  for (int j = 0; j < 240; j++) {
                    if (std::isnan((*target)[j])) (*target)[j] = lv;
                    else lv = (*target)[j];
                  }
                  lv = NAN;
                  for (int j = 239; j >= 0; j--) {
                    if (std::isnan((*target)[j])) (*target)[j] = lv;
                    else lv = (*target)[j];
                  }
                  for (int j = 0; j < 240; j++) if (std::isnan((*target)[j])) (*target)[j] = 0.0f;
                  ESP_LOGI("hist", "entity=%d pairs=%d body=%d t_from=%ld",
                    (int)id(load_target_idx), (int)pairs.size(), (int)blen, (long)t_from);

logger:
  level: DEBUG
  logs:
    font: ERROR
    display: ERROR
    mipi_spi: ERROR
    component: ERROR
    scheduler: ERROR
    mqtt: ERROR
    mqtt.idf: ERROR
    mqtt.client: ERROR
    http_request: INFO

spi:
  clk_pin: ${pin_clk}
  mosi_pin: ${pin_mosi}
  interface: hardware

output:
  - platform: ledc
    pin: ${pin_bl}
    id: backlight_pwm
    frequency: 5000Hz

light:
  - platform: monochromatic
    output: backlight_pwm
    name: ${board_name} Backlight
    id: backlight
    restore_mode: RESTORE_DEFAULT_ON
    default_transition_length: 300ms

font:
  - file: "gfonts://Roboto Mono"
    id: f_label
    size: 10
    glyphs: 'Power Fact.0123456789СейчасгодняCsf():'
  - file: "fonts/PxPlus_IBM_VGA_8x16.ttf"
    id: f_value
    size: 16
    bpp: 1
    glyphs: '0123456789. WkVAh-'
  - file: "fonts/PxPlus_IBM_VGA_8x14.ttf"
    id: f_dt
    size: 14
    bpp: 1
    glyphs: '0123456789.:- '
  - file: "fonts/Tamzen5x9r.ttf"
    id: f_axis
    size: 9
    bpp: 1
    glyphs: '0123456789.: '
  - file: "fonts/materialdesignicons-webfont.ttf"
    id: f_icon
    size: 16
    glyphs: ["\U000F0241", "\U000F0E73", "\U000F0583"]

color:
  - id: c_bg
    red: 3%
    green: 2%
    blue: 8%
  - id: c_card_bg
    red: 8%
    green: 5%
    blue: 16%
  - id: c_border
    red: 100%
    green: 0%
    blue: 80%
  - id: c_text
    red: 0%
    green: 95%
    blue: 100%
  - id: c_text_dim
    red: 80%
    green: 70%
    blue: 100%
  - id: c_grid
    red: 25%
    green: 5%
    blue: 40%
  - id: c_orange
    red: 100%
    green: 55%
    blue: 0%
  - id: c_green
    red: 0%
    green: 100%
    blue: 50%
  - id: c_purple
    red: 100%
    green: 0%
    blue: 95%
  - id: c_yellow
    red: 100%
    green: 90%
    blue: 0%
  - id: c_black
    red: 0%
    green: 0%
    blue: 0%

display:
  - platform: mipi_spi
    model: ST7789V
    dimensions:
      width: 320
      height: 170
      offset_width: 0
      offset_height: 35
    cs_pin: ${pin_cs}
    dc_pin: ${pin_dc}
    reset_pin: ${pin_reset}
    id: lcd
    spi_mode: MODE3
    data_rate: 40MHz
    color_order: bgr
    color_depth: 16
    invert_colors: true
    transform:
      swap_xy: true
      mirror_x: ${mirror_x}
      mirror_y: ${mirror_y}
    buffer_size: 12%
    update_interval: 300ms
    lambda: |-
      id(frame_counter)++;
      const int W = it.get_width();
      const int H = it.get_height();

      auto power_color = [](float v) -> Color {
        if (v < 400.0f) return Color(0, 255, 130);
        if (v >= 900.0f) return Color(255, 30, 90);
        float t = (v - 400.0f) / 500.0f;
        uint8_t r, g, b;
        if (t < 0.5f) {
          float u = t * 2.0f;
          r = (uint8_t)(0 + u * (255 - 0));
          g = (uint8_t)(255 - u * (255 - 230));
          b = (uint8_t)(130 - u * 130);
        } else {
          float u = (t - 0.5f) * 2.0f;
          r = 255;
          g = (uint8_t)(230 - u * (230 - 30));
          b = (uint8_t)(0 + u * (90 - 0));
        }
        return Color(r, g, b);
      };

      const int card_h = 32;
      const int card_w = 78;
      const int gap = 2;

      auto draw_card = [&](int idx, const char* val, const char* unit, const char* label, Color val_col) {
        int x0 = idx * (card_w + gap);
        int y0 = 2;
        int xc = x0 + card_w / 2;
        it.rectangle(x0, y0, card_w, card_h, id(c_border));
        char vu[24];
        if (unit && *unit) snprintf(vu, sizeof(vu), "%s %s", val, unit);
        else snprintf(vu, sizeof(vu), "%s", val);
        it.printf(xc, y0 + 4, id(f_value), val_col, TextAlign::TOP_CENTER, "%s", vu);
        it.printf(xc, y0 + 18, id(f_label), id(c_text_dim), TextAlign::TOP_CENTER, "%s", label);
      };

      auto last_known = [&](float cur, std::vector<float>& buf) -> float {
        if (std::isfinite(cur)) return cur;
        if (!buf.empty()) return buf.back();
        return NAN;
      };
      float p_now  = last_known(id(pzem_p).state,    id(buf_p));
      float e_now  = last_known(id(energy_day).state, id(buf_e));
      float pf_now = last_known(id(pzem_pf).state,   id(buf_pf));

      char p_str[16], e_str[16], pf_str[16];
      if (std::isfinite(p_now))  snprintf(p_str,  sizeof(p_str),  "%.0f", p_now);  else strcpy(p_str,  "---");
      if (std::isfinite(e_now))  snprintf(e_str,  sizeof(e_str),  "%.1f", e_now);  else strcpy(e_str,  "---");
      if (std::isfinite(pf_now)) snprintf(pf_str, sizeof(pf_str), "%.2f", pf_now); else strcpy(pf_str, "---");

      Color p_col = std::isfinite(p_now) ? power_color(p_now) : id(c_text_dim);
      Color e_col = Color(110, 255, 150);

      draw_card(0, p_str,  "W",   "Сейчас",   p_col);
      draw_card(1, e_str,  "kWh", "Сегодня",  e_col);
      draw_card(2, pf_str, "",    "PF Cos(f)", id(c_purple));

      {
        const int cw4 = 80;
        int x0 = 3 * (card_w + gap);
        int y0 = 2;
        int xc = x0 + cw4 / 2;
        it.rectangle(x0, y0, cw4, card_h, id(c_border));
        auto tn = id(homeassistant_time).now();
        char d_s[12], t_s[16];
        unsigned tenth = (unsigned)((millis() / 100) % 10);
        if (tn.is_valid()) {
          snprintf(d_s, sizeof(d_s), "%02d.%02d.%02d", tn.day_of_month, tn.month, tn.year % 100);
          snprintf(t_s, sizeof(t_s), "%02d:%02d:%02d.%u", tn.hour, tn.minute, tn.second, tenth);
        } else {
          strcpy(d_s, "--.--.--");
          snprintf(t_s, sizeof(t_s), "--:--:--.%u", tenth);
        }
        it.printf(xc, y0 + 3,  id(f_dt), id(c_text),     TextAlign::TOP_CENTER, "%s", d_s);
        it.printf(xc, y0 + 17, id(f_dt), id(c_text_dim), TextAlign::TOP_CENTER, "%s", t_s);
      }

      const int CL = 22;
      const int CR = 298;
      const int CT = 40;
      const int CB = 158;
      const int CW = CR - CL;
      const int CH = CB - CT;

      const float P_MAX = 2500.0f;
      const float PF_MAX = 1.0f;
      const int Y_STEPS = 5;

      for (int i = 0; i <= Y_STEPS; i++) {
        int y = CB - i * CH / Y_STEPS;
        for (int x = CL; x < CR; x += 4) it.draw_pixel_at(x, y, id(c_grid));
        char lbl[8];
        snprintf(lbl, sizeof(lbl), "%d", (int)(i * P_MAX / Y_STEPS));
        it.printf(CL - 2, y - 4, id(f_axis), id(c_text_dim), TextAlign::TOP_RIGHT, "%s", lbl);
        char pflbl[8];
        snprintf(pflbl, sizeof(pflbl), "%.1f", i * PF_MAX / Y_STEPS);
        it.printf(CR + 2, y - 4, id(f_axis), id(c_text_dim), "%s", pflbl);
      }

      it.line(CL, CB, CR, CB, id(c_border));

      auto &bp = id(buf_p);
      int n = (int)bp.size();
      if (n >= 1) {
        for (int x = 0; x < CW; x++) {
          float pos = (float)x * (float)(n - 1) / (float)(CW - 1);
          int idx0 = (int)pos;
          int idx1 = idx0 + 1;
          if (idx1 >= n) idx1 = n - 1;
          float frac = pos - (float)idx0;
          float v = bp[idx0] * (1.0f - frac) + bp[idx1] * frac;
          if (v < 0) v = 0;
          if (v > P_MAX) v = P_MAX;
          int bh = (int)(v / P_MAX * (float)(CH - 1));
          if (bh < 1) bh = 1;
          int bx = CL + x;
          it.line(bx, CB - bh, bx, CB - 1, power_color(v));
        }
      }

      auto &bpf = id(buf_pf);
      int npf = (int)bpf.size();
      if (npf >= 2) {
        int prev_x = CL;
        int prev_y = CB - (int)(bpf[0] * (float)(CH - 1));
        for (int x = 1; x < CW; x++) {
          float pos = (float)x * (float)(npf - 1) / (float)(CW - 1);
          int idx0 = (int)pos;
          int idx1 = idx0 + 1;
          if (idx1 >= npf) idx1 = npf - 1;
          float frac = pos - (float)idx0;
          float v = bpf[idx0] * (1.0f - frac) + bpf[idx1] * frac;
          if (v < 0) v = 0;
          if (v > 1) v = 1;
          int cur_x = CL + x;
          int cur_y = CB - (int)(v * (float)(CH - 1));
          it.line(prev_x, prev_y, cur_x, cur_y, id(c_purple));
          prev_x = cur_x;
          prev_y = cur_y;
        }
      }

      auto tn = id(homeassistant_time).now();
      if (tn.is_valid()) {
        time_t now_t = tn.timestamp;
        int min_mod = tn.minute % 10;
        time_t anchor = now_t - min_mod * 60 - tn.second;
        for (int k = -6; k <= 0; k++) {
          time_t t_mark = anchor + k * 600;
          if (t_mark < now_t - 60*60) continue;
          if (t_mark > now_t) continue;
          float frac = (float)(t_mark - (now_t - 60*60)) / (60.0f * 60.0f);
          int x = CL + (int)(frac * (float)CW);
          struct tm tmm;
          localtime_r(&t_mark, &tmm);
          char xlbl[8];
          snprintf(xlbl, sizeof(xlbl), "%02d:%02d", tmm.tm_hour, tmm.tm_min);
          it.printf(x, CB + 2, id(f_axis), id(c_text_dim), TextAlign::TOP_CENTER, "%s", xlbl);
          it.line(x, CB, x, CB + 2, id(c_border));
        }
      }
